name: gates

# Durable-demo route gate + immutable-conformance/parity gate + artifact schema validation.
# These are the same gates the routine runs before every push (see AGENTS.md / CLAUDE.md).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # the gates diff against origin/main for baselines
      - name: Ensure origin/main is available for baseline diffs
        run: git fetch origin main --depth=1 || true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Route regression gate (durable-demo contract)
        run: node scripts/check-routes.mjs
      - name: Conformance + parity gate (immutable suites, schema, coverage)
        run: node scripts/check-conformance.mjs
      - name: Lineage gate (identity preservation, dup/quant/port reproducibility, no-collapse)
        run: node scripts/check-lineage.mjs
      - name: Image provenance gate (fail-closed: every image ledgered; no unverified faces ship)
        run: node scripts/check-image-provenance.mjs
